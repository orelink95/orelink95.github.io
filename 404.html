<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Archive Void - The Athenaeum Vault</title>
    <link rel="icon" type="image/png" href="/images/EA-favicon.png" />
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=Newsreader:ital,wght@0,400;0,600;1,400&family=Manrope:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <link href="styles/output.css" rel="stylesheet" />
    <link href="styles/atlas-style.css" rel="stylesheet" />
    <link href="styles/main-style.css" rel="stylesheet" />

    <script src="scripts/general-scripts.js"></script>
</head>

<body
    class="bg-surface-dim text-on-surface font-body selection:bg-secondary/30 selection:text-secondary-fixed overflow-x-hidden">

    <div id="header-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <div class="flex flex-col min-h-screen md:ml-20 pt-20 bg-[#050505]">

        <main class="flex-grow flex items-center justify-center relative p-6 overflow-hidden">

            <div
                class="absolute inset-0 bg-[radial-gradient(circle_at_center,_#1a1c1a_0%,_#050505_70%)] pointer-events-none">
            </div>

            <div class="absolute inset-0 opacity-20 pointer-events-none mix-blend-screen"
                style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');">
            </div>

            <div
                class="relative w-full max-w-3xl bg-surface-container-lowest/80 backdrop-blur-md border border-outline-variant/10 shadow-[0_0_50px_rgba(0,0,0,0.8)] p-12 lg:p-20 text-center flex flex-col items-center group z-10">

                <div
                    class="absolute -top-1 -left-1 w-8 h-8 border-t-2 border-l-2 border-secondary/40 pointer-events-none transition-colors group-hover:border-secondary">
                </div>
                <div
                    class="absolute -top-1 -right-1 w-8 h-8 border-t-2 border-r-2 border-secondary/40 pointer-events-none transition-colors group-hover:border-secondary">
                </div>
                <div
                    class="absolute -bottom-1 -left-1 w-8 h-8 border-b-2 border-l-2 border-secondary/40 pointer-events-none transition-colors group-hover:border-secondary">
                </div>
                <div
                    class="absolute -bottom-1 -right-1 w-8 h-8 border-b-2 border-r-2 border-secondary/40 pointer-events-none transition-colors group-hover:border-secondary">
                </div>

                <div class="absolute inset-3 border border-secondary/5 pointer-events-none"></div>

                <div
                    class="absolute inset-0 flex items-center justify-center font-headline text-[12rem] md:text-[18rem] font-bold text-secondary/[0.03] select-none pointer-events-none z-0 tracking-tighter">
                    404
                </div>

                <div class="relative z-10">
                    <span class="material-symbols-outlined text-primary/40 text-6xl mb-6 block"
                        style="font-variation-settings: 'FILL' 0;">
                        history_toggle_off
                    </span>

                    <p
                        class="font-label text-[10px] md:text-xs uppercase tracking-[0.3em] text-primary mb-4 animate-pulse-slow">
                        Archive Void Encountered
                    </p>

                    <h1 class="font-headline text-4xl md:text-5xl text-secondary mb-6 tracking-tight">
                        A Missing Tome
                    </h1>

                    <div
                        class="w-32 h-px bg-gradient-to-r from-transparent via-secondary/50 to-transparent mx-auto mb-8">
                    </div>

                    <p
                        class="font-newsreader text-lg md:text-xl italic text-on-surface-variant/80 leading-relaxed mb-10 max-w-lg mx-auto">
                        "You reach for the scroll, but find only dust slipping through your fingers. The knowledge you
                        seek was lost to the Rampant Void, or perhaps the scribes have not yet recorded it."
                    </p>

                    <a href="world.html"
                        class="inline-flex items-center gap-3 px-8 py-3 bg-surface-container-high border border-secondary/30 text-secondary hover:bg-secondary hover:text-black transition-all duration-300 rounded font-label text-[10px] md:text-xs uppercase tracking-widest shadow-lg hover:shadow-[0_0_20px_rgba(233,193,118,0.4)]">
                        <span class="material-symbols-outlined text-[18px]">public</span>
                        Return to the Known Realms
                    </a>
                </div>
            </div>
        </main>

        <div class="mt-auto bg-surface-container-lowest border-t border-outline-variant/10 z-10 shrink-0">
            <div id="footer-placeholder"></div>
        </div>
    </div>

</body>

</html>
