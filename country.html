<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Region View - The Athenaeum Vault</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=Newsreader:ital,wght@0,400;0,600;1,400&family=Manrope:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="styles/output.css" rel="stylesheet" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <link href="styles/atlas-style.css" rel="stylesheet" />
    <link href="styles/main-style.css" rel="stylesheet" />

    <script src="scripts/general-scripts.js"></script>
    <script src="scripts/country-registry.js"></script>
    <script src="scripts/country-scripts.js"></script>
</head>

<body
    class="bg-surface text-on-surface font-body selection:bg-secondary-container selection:text-on-secondary-container overflow-x-hidden">

    <div id="header-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main
        class="md:ml-20 pt-24 px-4 md:px-8 pb-12 min-h-screen flex flex-col transition-all duration-500 ease-in-out relative">

        <div id="dynamic-bg-blur"
            class="absolute inset-0 opacity-10 mix-blend-overlay pointer-events-none bg-cover bg-center -z-10"></div>

        <header class="mb-8 z-10">
            <nav
                class="flex items-center gap-2 font-label text-[10px] uppercase tracking-widest text-on-surface-variant/60 mb-2">
                <a class="hover:text-secondary cursor-pointer transition-colors">Eraldom</a>
                <span class="material-symbols-outlined text-[12px]">chevron_right</span>
                <a id="dynamic-continent-name"
                    class="hover:text-secondary cursor-pointer transition-colors">Continent</a>
                <span class="material-symbols-outlined text-[12px]">chevron_right</span>
                <span id="dynamic-region-name" class="text-secondary font-bold">Region</span>
            </nav>
            <h1 id="dynamic-title" class="text-4xl font-headline font-bold text-on-surface tracking-tight">Loading...
            </h1>
            <p id="dynamic-description"
                class="font-newsreader text-sm leading-relaxed text-on-surface-variant/70 mt-2 max-w-2xl">Fetching
                archive data...</p>
        </header>

        <div class="grid grid-cols-12 gap-8 flex-1 z-10">

            <div
                class="col-span-12 lg:col-span-3 relative h-[700px] rounded-xl bg-surface-container-low border border-outline-variant/20 p-8 shadow-2xl overflow-hidden group lore-card">

                <div class="pointer-events-none absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500 z-0"
                    style="background: radial-gradient(400px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(233,193,118, 0.08), transparent 40%);">
                </div>

                <span
                    class="material-symbols-outlined absolute -bottom-10 -right-10 text-[15rem] text-secondary/5 rotate-12 select-none pointer-events-none z-0"
                    style="font-variation-settings: 'FILL' 1;">
                    auto_stories
                </span>

                <div class="relative z-10 h-full flex flex-col custom-scrollbar overflow-y-auto pr-4 -mr-4">
                    <div class="mb-8">
                        <div class="flex justify-between items-start mb-2">
                            <span id="lore-entry-id"
                                class="font-label text-[10px] uppercase tracking-[0.2em] text-primary block animate-pulse-slow">Codex
                                Entry</span>

                            <button id="reset-lore-btn"
                                class="hidden text-on-surface-variant hover:text-secondary hover:-translate-x-1 transition-all duration-300 group flex items-center gap-1"
                                title="Return to Overview">
                                <span class="material-symbols-outlined text-[16px]">undo</span>
                                <span
                                    class="font-label text-[10px] uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">Overview</span>
                            </button>
                        </div>

                        <h2 id="lore-title" class="font-headline text-3xl text-secondary font-bold tracking-tight mb-4">
                            Loading Lore...</h2>
                        <div class="w-16 h-px bg-gradient-to-r from-secondary via-secondary/50 to-transparent"></div>
                    </div>

                    <div id="lore-body" class="font-body text-base text-on-surface-variant leading-relaxed space-y-6">
                    </div>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-9 relative group">

                <div
                    class="w-full h-[700px] bg-surface-container-low rounded-xl overflow-hidden shadow-2xl border border-outline-variant/10 flex p-6 relative">

                    <div class="relative w-full h-full z-10">
                        <div
                            class="absolute -top-3 -left-3 w-8 h-8 border-t-2 border-l-2 border-secondary/50 z-20 pointer-events-none">
                        </div>
                        <div
                            class="absolute -top-3 -right-3 w-8 h-8 border-t-2 border-r-2 border-secondary/50 z-20 pointer-events-none">
                        </div>
                        <div
                            class="absolute -bottom-3 -left-3 w-8 h-8 border-b-2 border-l-2 border-secondary/50 z-20 pointer-events-none">
                        </div>
                        <div
                            class="absolute -bottom-3 -right-3 w-8 h-8 border-b-2 border-r-2 border-secondary/50 z-20 pointer-events-none">
                        </div>

                        <div id="country-map"
                            class="w-full h-full !bg-[#050505] border border-secondary/10 rounded-sm z-10 shadow-inner">
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="mt-16 z-10">
            <div id="footer-placeholder"></div>
        </div>
    </main>

</body>

</html>
